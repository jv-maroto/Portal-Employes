# Configuración Nginx para Portal Empleados integrado con sagreracanarias.es
# Adaptada para trabajar con el subdir /trabajadores/

# Rate limiting para API y login
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

server {
    listen 80;
    server_name sagreracanarias.es www.sagreracanarias.es;
    return 301 https://sagreracanarias.es$request_uri;
}

server {
    listen 443 ssl;
    server_name sagreracanarias.es www.sagreracanarias.es;

    ssl_certificate /etc/nginx/certs/cert.crt;
    ssl_certificate_key /etc/nginx/certs/key.key;
    ssl_trusted_certificate /etc/nginx/certs/ca.crt;

    # Protocolos SSL seguros
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5:!RC4;
    ssl_prefer_server_ciphers on;

    client_max_body_size 20M;

    # Headers de seguridad globales
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Bloquear acceso a archivos ocultos (.env, .git, etc.)
    location ~ /\. {
        deny all;
        return 404;
    }

    # PRESTASHOP - sigue igual
    location / {
        proxy_pass http://prestashop:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_connect_timeout  300s;
        proxy_send_timeout     300s;
        proxy_read_timeout     300s;
        send_timeout           300s;
        proxy_buffering        off;
    }

    # FRONTEND REACT - Portal Empleados
    location /trabajadores/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /trabajadores/index.html;

        # Cache para assets estáticos
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|ttf)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options nosniff always;
        }
    }

    # BACKEND DJANGO - API y Admin
    location /trabajadores/admin/ {
        rewrite ^/trabajadores/admin/?(.*)$ /admin/$1 break;
        proxy_set_header X-Forwarded-Prefix /trabajadores;
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_connect_timeout  300s;
        proxy_send_timeout     300s;
        proxy_read_timeout     300s;
    }

    # LOGIN - Rate limiting estricto
    location /trabajadores/api/token/ {
        limit_req zone=login_limit burst=3 nodelay;
        rewrite ^/trabajadores/api/?(.*)$ /api/$1 break;
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # API ENDPOINTS - Django REST API
    location /trabajadores/api/ {
        limit_req zone=api_limit burst=20 nodelay;
        rewrite ^/trabajadores/api/?(.*)$ /api/$1 break;
        proxy_set_header X-Forwarded-Prefix /trabajadores;
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ARCHIVOS ESTÁTICOS DE DJANGO
    location /trabajadores/static/ {
        alias /app/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ARCHIVOS MEDIA - Proxy a Django (requiere autenticación)
    location /trabajadores/media/ {
        proxy_set_header X-Forwarded-Prefix /trabajadores;
        proxy_pass http://backend:8000/media/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
